name: Build & Test (build.py)

on:
  pull_request:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build_and_test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout main repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Install SSH Key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.MY_PRIVATE_KEY_1 }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Add GitHub and Server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa,ed25519 github.com >> ~/.ssh/known_hosts
          ssh-keyscan -H 47.94.195.108 >> ~/.ssh/known_hosts

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            clang-20 \
            llvm-20-dev \
            pkg-config \
            libboost-all-dev \
            libeigen3-dev
          pip install --upgrade 'cmake>=3.30'

      - name: Install Intel oneAPI MKL
        run: |
          wget -O- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | gpg --dearmor \
            | sudo tee /usr/share/keyrings/oneapi-archive-keyring.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-mkl-devel

      - name: Install CUDA Toolkit
        run: |
          wget https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
          sudo dpkg -i cuda-keyring_1.1-1_all.deb
          sudo apt-get update
          sudo apt-get install -y cuda-toolkit-12-6

      - name: Clone simulation_golden_data (sibling)
        run: |
          cd "$GITHUB_WORKSPACE/.."
          git clone --depth 1 git@github.com:likooooo/simulation_golden_data.git simulation_golden_data
          cd simulation_golden_data
          python3 ./setup_simulation_data.py -v --source_dir golden_data

      - name: Initialize and Update Submodules
        run: git submodule update --init --recursive --depth 1

      - name: Build and test (build.py --clean)
        env:
          CI: true
        run: |
          source scripts/init-build-env.sh
          python3 build.py --clean
